releaseNotes: "## Typescript SDK Changes:\n* `moov.cardIssuing.request()`:  `response.state` **Changed** (Breaking ⚠️)\n* `moov.cardIssuing.getFull()`:  `response.state` **Changed** (Breaking ⚠️)\n* `moov.cardIssuing.update()`:  `response.state` **Changed** (Breaking ⚠️)\n* `moov.cardIssuing.get()`:  `response.state` **Changed** (Breaking ⚠️)\n* `moov.cardIssuing.list()`: \n  *  `request.states` **Changed** (Breaking ⚠️)\n  *  `response.[].state` **Changed** (Breaking ⚠️)\n* `moov.invoices.createInvoice()`:  `response.paymentLinkUrl` **Added**\n* `moov.transfers.create()`: \n  *  `request.createTransfer.destination.cardDetails.scheduledDeliveryOn` **Added**\n  *  `response.source.cardDetails` **Changed**\n  *  `error.source.cardDetails` **Changed**\n* `moov.capabilities.disable()`: \n  *  `request.capabilityId` **Changed**\n* `moov.depositView.create()`: **Added**\n* `moov.invoices.listInvoices()`:  `response.[].paymentLinkUrl` **Added**\n* `moov.invoices.getInvoice()`:  `response.paymentLinkUrl` **Added**\n* `moov.invoices.updateInvoice()`:  `response.paymentLinkUrl` **Added**\n* `moov.paymentLinks.create()`: \n  *  `request.createPaymentLink.payout.pushOptions` **Added**\n  *  `response.payout.pushOptions` **Added**\n  *  `error.payout.pushOptions` **Added**\n* `moov.paymentLinks.list()`:  `response.[].payout.pushOptions` **Added**\n* `moov.paymentLinks.get()`:  `response.payout.pushOptions` **Added**\n* `moov.paymentLinks.update()`: \n  *  `request.updatePaymentLink` **Changed**\n  *  `response.payout.pushOptions` **Added**\n  *  `error.payout.pushOptions` **Added**\n* `moov.paymentMethods.list()`:  `response.[].union(card-payment).card.cardCategory` **Added**\n* `moov.paymentMethods.get()`:  `response.union(push-to-card).card.cardCategory` **Added**\n* `moov.capabilities.get()`: \n  *  `request.capabilityId` **Changed**\n  *  `response.capability.enum(issuing.cardholder)` **Added**\n* `moov.transfers.list()`:  `response.[].source.cardDetails` **Changed**\n* `moov.transfers.batchGetTransfers()`:  `response.Map<Transfer>.source.cardDetails` **Changed**\n* `moov.transfers.get()`:  `response.source.cardDetails` **Changed**\n* `moov.transfers.update()`: \n  *  `request.patchTransfer.foreignId` **Changed**\n  *  `response.source.cardDetails` **Changed**\n* `moov.wallets.update()`: \n  *  `request.patchWallet` **Changed**\n* `moov.capabilities.request()`: \n  *  `request.addCapabilities.capabilities[].enum(issuing.cardholder)` **Added**\n  *  `response.[].capability.enum(issuing.cardholder)` **Added**\n* `moov.capabilities.list()`:  `response.[].capability.enum(issuing.cardholder)` **Added**\n* `moov.accounts.listConnected()`: \n  *  `request.capability` **Changed**\n* `moov.accounts.list()`: \n  *  `request.capability` **Changed**\n* `moov.accounts.create()`: \n  *  `request.capabilities[].enum(issuing.cardholder)` **Added**\n* `moov.onboarding.createInvite()`: \n  *  `request.capabilities[].enum(issuing.cardholder)` **Added**\n  *  `response.capabilities[].enum(issuing.cardholder)` **Added**\n* `moov.onboarding.listInvites()`:  `response.[].capabilities[].enum(issuing.cardholder)` **Added**\n* `moov.onboarding.getInvite()`:  `response.capabilities[].enum(issuing.cardholder)` **Added**\n"
